<div class="page">
  <div class="form-card">

    <div class="form-header">
      <h2>Add New Employee</h2>
      <a routerLink="/employees">← Back to List</a>
    </div>

    @if (error) {
      <div class="error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="first_name" name="first_name" required />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="last_name" name="last_name" required />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Gender</label>
          <select [(ngModel)]="gender" name="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Salary</label>
          <input type="number" [(ngModel)]="salary" name="salary" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <input type="text" [(ngModel)]="department" name="department" required />
        </div>
        <div class="form-group">
          <label>Designation</label>
          <input type="text" [(ngModel)]="designation" name="designation" required />
        </div>
      </div>

      <div class="form-group">
        <label>Date of Joining</label>
        <input type="date" [(ngModel)]="date_of_joining" name="date_of_joining" required />
      </div>

      <div class="form-group">
        <label>Employee Photo URL</label>
        <input type="text" [(ngModel)]="employee_photo" name="employee_photo" placeholder="https://..." />
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Adding...' : 'Add Employee' }}
      </button>

    </form>

  </div>
</div>
